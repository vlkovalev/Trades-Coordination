services:
  - type: web
    name: constrivo
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    disk:
      name: constrivo-uploads
      mountPath: /var/data/uploads
      sizeGB: 1
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: UPLOAD_FOLDER
        value: /var/data/uploads
      - key: SEED_PASSWORD
        sync: false
