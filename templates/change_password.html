<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Change Password — Constrivo</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header>
    <div class="nav-container">
      <div class="logo">Constri<span>vo</span></div>
      <a href="{{ url_for('dashboard_redirect') }}" class="btn btn-secondary" style="padding: 6px 14px; font-size: 0.8rem;">Back to dashboard</a>
    </div>
  </header>

  <main>
    <div class="card" style="max-width: 480px;">
      <h1 style="margin-bottom: 4px;">Change Password</h1>
      <p class="text-muted" style="margin-bottom: 20px;">Update the password for your account.</p>

      {% with messages = get_flashed_messages(category_filter=["success", "error"]) %}
        {% if messages %}
          {% for message in messages %}
            <div class="alert-box {% if 'updated' in message %}alert-success{% else %}alert-error{% endif %}">
              {{ message }}
            </div>
          {% endfor %}
        {% endif %}
      {% endwith %}

      <form method="post">
        <label for="current_password">Current password</label>
        <input type="password" id="current_password" name="current_password" required autocomplete="current-password">

        <label for="new_password">New password</label>
        <input type="password" id="new_password" name="new_password" required autocomplete="new-password" minlength="8">

        <label for="confirm_password">Confirm new password</label>
        <input type="password" id="confirm_password" name="confirm_password" required autocomplete="new-password" minlength="8">

        <button type="submit" class="btn btn-primary" style="margin-top: 20px;">Update password</button>
      </form>
    </div>
  </main>
</body>
</html>
