<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audit Log</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
    main { max-width: 1000px; margin: 0 auto; padding: 24px 20px 56px; }
    .card { background: white; border-radius: 14px; padding: 18px; box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08); }
    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 8px; border-bottom: 1px solid #e2e8f0; text-align: left; font-size: 0.9rem; }
    a { display: inline-block; margin-bottom: 12px; }
  </style>
</head>
<body>
  <main>
    <a href="{{ url_for('gc_dashboard') }}">&larr; Back to dashboard</a>
    <h1>Audit Log</h1>
    <div class="card">
      <table>
        <thead>
          <tr><th>Time</th><th>Actor</th><th>Action</th><th>Entity</th><th>Detail</th></tr>
        </thead>
        <tbody>
          {% for e in entries %}
            <tr>
              <td>{{ e.timestamp.strftime('%b %d, %Y %I:%M %p') }}</td>
              <td>{{ e.actor }}</td>
              <td>{{ e.action }}</td>
              <td>{{ e.entity_type }} #{{ e.entity_id }}</td>
              <td>{{ e.detail }}</td>
            </tr>
          {% else %}
            <tr><td colspan="5">No audit entries yet.</td></tr>
          {% endfor %}
        </tbody>
      </table>
    </div>
  </main>
</body>
</html>
