<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Add Task — {{ project.name }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
  <header>
    <div class="nav-container">
      <div class="logo">Trades<span>Sync</span></div>
      <div class="user-badge">GC Portal</div>
    </div>
  </header>
  
  <main>
    <a href="{{ url_for('project_detail', project_id=project.id) }}" style="display: inline-block; margin-bottom: 20px;">&larr; Back to {{ project.name }}</a>
    
    <div class="card" style="max-width: 600px; margin: 0 auto;">
      <h1>Add New Task</h1>
      <p style="margin-bottom: 24px;">Define a scope of work and designate a trade category for {{ project.name }}.</p>
      
      <form method="post">
        <label for="title">Task Title</label>
        <input type="text" id="title" name="title" placeholder="e.g., Rough-in plumbing" required autocomplete="off">
        
        <label for="trade">Designated Trade</label>
        <select id="trade" name="trade" required>
          {% for trade_type in trade_types %}
            <option value="{{ trade_type }}">{{ trade_type|capitalize }}</option>
          {% endfor %}
        </select>
        
        <label for="status">Initial Status</label>
        <select id="status" name="status">
          <option value="pending">Pending (Unassigned)</option>
          <option value="confirmed">Confirmed (Assigned)</option>
        </select>
        
        <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 24px;">Create Task</button>
      </form>
    </div>
  </main>
</body>
</html>
