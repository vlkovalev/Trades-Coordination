<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Project</title>
  <style>
    body { font-family: Arial, sans-serif; margin: 0; background: #f8fafc; color: #0f172a; }
    main { max-width: 700px; margin: 0 auto; padding: 24px 20px 56px; }
    .card { background: white; border-radius: 14px; padding: 18px; box-shadow: 0 10px 24px rgba(15, 23, 42, 0.08); }
    label { display: block; margin-top: 12px; font-weight: bold; }
    input { width: 100%; padding: 10px; margin-top: 6px; box-sizing: border-box; }
    button { margin-top: 16px; background: #2563eb; color: white; border: none; padding: 10px 16px; border-radius: 999px; cursor: pointer; }
    .errors { background: #fef2f2; color: #b91c1c; padding: 10px 12px; border-radius: 10px; margin-bottom: 12px; }
    .consent-row { display: flex; align-items: flex-start; gap: 8px; margin-top: 18px; }
    .consent-row input { width: auto; margin-top: 4px; }
    .consent-text { font-size: 0.85rem; color: #444; font-weight: normal; }
    a { display: inline-block; margin-bottom: 12px; }
  </style>
</head>
<body>
  <main>
    <a href="{{ url_for('gc_dashboard') }}">&larr; Back to dashboard</a>
    <div class="card">
      <h1>Create Project</h1>
      {% with messages = get_flashed_messages(category_filter=["error"]) %}
        {% if messages %}
          <div class="errors">
            {% for message in messages %}<div>{{ message }}</div>{% endfor %}
          </div>
        {% endif %}
      {% endwith %}
      <form method="post">
        <label for="name">Project name</label>
        <input id="name" name="name" value="{{ form.get('name', '') }}" required>

        <label for="address">Project address</label>
        <input id="address" name="address" value="{{ form.get('address', '') }}" required>

        <label for="client_name">Client name</label>
        <input id="client_name" name="client_name" value="{{ form.get('client_name', '') }}" required>

        <label for="client_phone">Client phone</label>
        <input id="client_phone" name="client_phone" value="{{ form.get('client_phone', '') }}" placeholder="+15555550123" required>

        <label for="client_email">Client email (optional)</label>
        <input id="client_email" type="email" name="client_email" value="{{ form.get('client_email', '') }}">

        <div class="consent-row">
          <input type="checkbox" id="consent" name="consent" value="yes">
          <label for="consent" class="consent-text" style="margin-top: 0;">{{ consent_text }}</label>
        </div>

        <button type="submit">Create project</button>
      </form>
    </div>
  </main>
</body>
</html>
